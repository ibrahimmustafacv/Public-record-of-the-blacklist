<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السجل العام | القائمة السوداء</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    :root{
        --ink:#12192b;
        --ink-2:#1c2946;
        --paper:#e9e6dd;
        --paper-deep:#dedad0;
        --folder:#f1e8d0;
        --line:#d8cdb0;
        --text:#20263a;
        --muted:#6b7280;
        --gold:#b8892b;
        --gold-deep:#8f6a1f;
        --safe:#1f7a53;
        --safe-bg:#e3f1e9;
        --warn:#c98a1d;
        --warn-bg:#faf0dc;
        --danger:#b91c3c;
        --danger-bg:#fbe7ea;
        --radius-s:6px;
        --radius-m:10px;
        --shadow-card:0 2px 4px rgba(18,25,43,0.06), 0 10px 24px rgba(18,25,43,0.06);
        --shadow-lift:0 14px 34px rgba(18,25,43,0.14);
    }
    *{ margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
    html{ scroll-behavior:smooth; }
    body{
        background:
            radial-gradient(1200px 600px at 15% -10%, rgba(184,137,43,0.06), transparent 60%),
            var(--paper);
        min-height:100vh;
        padding:28px 20px 60px;
        color:var(--text);
    }
    .app-container{ max-width:1180px; margin:0 auto; }

    /* ========= الهيدر ========= */
    .masthead{
        background:linear-gradient(160deg, var(--ink) 0%, var(--ink-2) 100%);
        color:#fff;
        border-radius:14px;
        padding:0;
        overflow:hidden;
        box-shadow:var(--shadow-lift);
        margin-bottom:10px;
    }
    .masthead-top{
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:20px;
        padding:26px 32px 22px;
        flex-wrap:wrap;
    }
    .brand{ display:flex; align-items:center; gap:16px; }
    .brand-seal{
        width:52px; height:52px; flex:0 0 auto;
        border:2px solid rgba(184,137,43,0.9);
        border-radius:50%;
        display:flex; align-items:center; justify-content:center;
        background:rgba(184,137,43,0.08);
        color:#e8c26a;
        font-size:20px;
        position:relative;
    }
    .brand-seal::after{
        content:"";
        position:absolute; inset:-6px;
        border:1px dashed rgba(184,137,43,0.45);
        border-radius:50%;
    }
    .brand-text h1{
        font-family:'Tajawal', sans-serif;
        font-weight:900;
        font-size:23px;
        letter-spacing:0.5px;
    }
    .brand-text p{
        font-size:12.5px;
        color:#aab1c6;
        margin-top:4px;
        letter-spacing:0.3px;
    }
    .ledger{
        display:flex;
        gap:10px;
        flex-wrap:wrap;
    }
    .ledger .stat{
        background:rgba(255,255,255,0.06);
        border:1px solid rgba(255,255,255,0.12);
        border-radius:var(--radius-s);
        padding:9px 18px;
        min-width:96px;
        text-align:center;
    }
    .ledger .stat span{
        display:block;
        font-size:11px;
        color:#9aa2b8;
        margin-bottom:4px;
        letter-spacing:0.4px;
    }
    .ledger .stat strong{
        font-family:'Tajawal', sans-serif;
        font-size:22px;
        font-weight:800;
        font-variant-numeric:tabular-nums;
    }
    .ledger .stat.total strong{ color:#fff; }
    .ledger .stat.bad strong{ color:#f18b9c; }
    .ledger .stat.good strong{ color:#7fd4ac; }
    .warning-strip{
        height:7px;
        background:repeating-linear-gradient(135deg, var(--gold) 0 14px, #2a2210 14px 28px);
        opacity:0.9;
    }

    /* ========= زر الإبلاغ ========= */
    .report-toolbar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        margin: 22px 0 22px;
    }
    .btn-report {
        background: var(--danger);
        color: #fff;
        border: none;
        padding: 12px 28px;
        border-radius: var(--radius-m);
        font-weight: 800;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 4px 12px rgba(185, 28, 60, 0.3);
        transition: 0.2s;
    }
    .btn-report:hover { background: #a31c3a; transform: scale(1.02); }

    .search-wrap{
        flex: 1 1 260px;
        position:relative;
        min-width:200px;
    }
    .search-wrap i{
        position:absolute; right:14px; top:50%; transform:translateY(-50%);
        color:var(--muted); font-size:13px;
    }
    .search-wrap input{
        width:100%;
        padding:11px 40px 11px 16px;
        border:1px solid var(--line);
        border-radius:var(--radius-s);
        background:#fff;
        font-size:14.5px;
        font-family:'Cairo', sans-serif;
    }
    .search-wrap input:focus{ outline:none; border-color:var(--gold); }
    .toolbar-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
    }
    .toolbar-actions select{
        padding:11px 16px;
        border:1px solid var(--line);
        border-radius:var(--radius-s);
        background:#fff;
        font-size:14px;
        font-family:'Cairo', sans-serif;
        cursor:pointer;
    }

    /* ========= الفورم (مودال) - لم يتغير ========= */
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        z-index: 2000;
        justify-content: center;
        align-items: center;
        padding: 20px;
        overflow-y: auto;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
        background: white;
        max-width: 600px;
        width: 100%;
        border-radius: var(--radius-m);
        padding: 30px 28px;
        box-shadow: var(--shadow-lift);
        position: relative;
        animation: modalIn 0.3s ease;
        max-height: 95vh;
        overflow-y: auto;
    }
    @keyframes modalIn {
        from { opacity: 0; transform: scale(0.95) translateY(20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-box .close-modal {
        position: absolute;
        top: 15px; left: 20px;
        background: none;
        border: none;
        font-size: 28px;
        color: var(--muted);
        cursor: pointer;
        transition: 0.2s;
    }
    .modal-box .close-modal:hover { color: var(--danger); transform: rotate(90deg); }
    .modal-box h2 {
        font-family: 'Tajawal', sans-serif;
        color: var(--danger);
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 2px solid var(--line);
        padding-bottom: 12px;
    }
    .modal-box .field-group {
        margin-bottom: 18px;
    }
    .modal-box .field-group label {
        display: block;
        font-weight: 700;
        font-size: 14px;
        color: var(--text);
        margin-bottom: 6px;
    }
    .modal-box .field-group label i { color: var(--gold); margin-left: 6px; }
    .modal-box .field-group input,
    .modal-box .field-group select,
    .modal-box .field-group textarea {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid var(--line);
        border-radius: var(--radius-s);
        font-size: 15px;
        font-family: 'Cairo', sans-serif;
        background: #fcfaf5;
        transition: 0.2s;
    }
    .modal-box .field-group input:focus,
    .modal-box .field-group select:focus,
    .modal-box .field-group textarea:focus {
        border-color: var(--gold);
        outline: none;
        background: white;
    }
    .modal-box .field-group textarea { resize: vertical; min-height: 70px; }
    .modal-box .field-group .file-label {
        display: inline-block;
        background: var(--ink);
        color: white;
        padding: 10px 18px;
        border-radius: var(--radius-s);
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: 0.2s;
    }
    .modal-box .field-group .file-label:hover { background: var(--ink-2); }
    .modal-box .field-group .file-label i { margin-left: 8px; }
    .modal-box .field-group .file-name {
        margin-right: 12px;
        color: var(--muted);
        font-size: 13px;
    }
    .modal-box .btn-submit-report {
        width: 100%;
        background: var(--danger);
        color: white;
        border: none;
        padding: 14px;
        border-radius: var(--radius-s);
        font-weight: 800;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
        margin-top: 10px;
    }
    .modal-box .btn-submit-report:hover { background: #a31c3a; }
    .modal-box .btn-submit-report:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    /* ========= شبكة البطاقات (تم إضافة ستايل الصورة) ========= */
    .places-grid{
        display:grid;
        grid-template-columns:repeat(auto-fill, minmax(290px, 1fr));
        gap:22px 20px;
        margin-top: 10px;
    }
    .place-card{
        position:relative;
        background:#f6ecea;
        border:1px solid #e3b9bd;
        border-radius:var(--radius-m);
        padding:20px 20px 18px;
        box-shadow:var(--shadow-card);
        transition:transform .2s ease, box-shadow .2s ease;
        overflow:hidden;
        animation:rise .35s ease both;
    }
    @keyframes rise{ from{ opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
    .place-card:hover{ transform:translateY(-4px); box-shadow:var(--shadow-lift); }
    .tab{
        position:absolute; top:0; right:22px;
        background:var(--danger);
        color:#fff;
        font-size:11px;
        font-weight:700;
        padding:4px 14px 6px;
        border-radius:0 0 6px 6px;
        letter-spacing:0.4px;
    }
    .card-head{ margin-top:18px; margin-bottom:6px; }
    .card-head .name{
        font-family:'Tajawal', sans-serif;
        font-size:18.5px;
        font-weight:800;
        color:var(--ink);
        display:block;
        line-height:1.35;
    }
    .card-head .file-id{
        font-size:11px; color:var(--muted); letter-spacing:0.3px;
    }
    .place-image {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: var(--radius-s);
        margin: 10px 0 12px;
        background: #e9e2d0;
        border: 1px solid #d8cdb0;
    }
    .address{
        color:#5b5546;
        font-size:13.5px;
        margin:8px 0 14px;
        display:flex; align-items:center; gap:6px;
    }
    .address i{ color:var(--gold-deep); font-size:12px; }

    .meter-block{ margin-bottom:14px; }
    .meter-top{
        display:flex; justify-content:space-between; align-items:baseline;
        font-size:12px; color:var(--muted); margin-bottom:6px;
    }
    .meter-top b{
        font-family:'Tajawal', sans-serif;
        font-size:14px; color:var(--text);
        font-variant-numeric:tabular-nums;
    }
    .meter-track{
        height:7px; border-radius:8px; background:#e3dbc4; overflow:hidden;
    }
    .meter-fill{ height:100%; border-radius:8px; transition:width .3s ease; }

    .stamp{
        position:absolute;
        left:14px; bottom:14px;
        border:3px double var(--danger);
        color:var(--danger);
        font-family:'Tajawal', sans-serif;
        font-weight:900;
        font-size:13px;
        letter-spacing:1px;
        padding:4px 12px;
        border-radius:6px;
        transform:rotate(-9deg);
        opacity:0.9;
        background:rgba(185,28,60,0.04);
        pointer-events:none;
    }

    .empty-state{
        grid-column:1 / -1;
        text-align:center;
        padding:70px 20px;
        color:var(--muted);
        background:#fff;
        border:1px dashed var(--line);
        border-radius:var(--radius-m);
    }
    .empty-state i{ font-size:44px; margin-bottom:14px; color:#c9beA0; }
    .empty-state p{ font-family:'Tajawal', sans-serif; font-weight:700; font-size:15px; }

    .toast-stack{
        position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
        display:flex; flex-direction:column; gap:8px;
        z-index:9999;
        width:min(90vw, 360px);
    }
    .toast{
        background:var(--ink);
        color:#fff;
        padding:12px 18px;
        border-radius:var(--radius-s);
        font-size:13.5px;
        display:flex; align-items:center; gap:10px;
        box-shadow:0 10px 26px rgba(0,0,0,0.25);
        animation:toastIn .25s ease both;
    }
    .toast.danger{ background:var(--danger); }
    .toast.success{ background:var(--safe); }
    .toast.warning{ background:var(--warn); }
    @keyframes toastIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

    @media (max-width:640px){
        .masthead-top{ flex-direction:column; align-items:stretch; }
        .ledger{ justify-content:center; }
        .report-toolbar { flex-direction: column; align-items: stretch; }
        .toolbar-actions { flex-wrap: wrap; }
        .btn-report { justify-content: center; }
        .modal-box { padding: 20px; }
        .place-image { height: 140px; }
    }
    @media (prefers-reduced-motion: reduce){
        *{ animation:none !important; transition:none !important; }
    }
</style>
</head>
<body>
    <div class="app-container">
        <!-- الهيدر -->
        <div class="masthead">
            <div class="masthead-top">
                <div class="brand">
                    <div class="brand-seal"><i class="fas fa-shield-halved"></i></div>
                    <div class="brand-text">
                        <h1>السجل العام للقائمة السوداء</h1>
                        <p>استعراض الكيانات والأماكن المحظورة فقط</p>
                    </div>
                </div>
                <div class="ledger">
                    <div class="stat total"><span>إجمالي الملفات</span><strong id="totalCount">0</strong></div>
                    <div class="stat bad"><span>في القائمة السوداء</span><strong id="blackCount">0</strong></div>
                    <div class="stat good"><span>آمنة حالياً</span><strong id="safeCount">0</strong></div>
                </div>
            </div>
            <div class="warning-strip"></div>
        </div>

        <div class="report-toolbar">
            <button class="btn-report" onclick="openModal()">
                <i class="fas fa-plus-circle"></i> الإبلاغ عن كيان جديد
            </button>
            <div class="toolbar-actions">
                <div class="search-wrap">
                    <input type="text" id="searchInput" placeholder="ابحث بالاسم أو العنوان..." oninput="renderPlaces()">
                    <i class="fas fa-magnifying-glass"></i>
                </div>
                <select id="categoryFilter" onchange="renderPlaces()">
                    <option value="الكل">كل التصنيفات</option>
                    <option value="مطعم">مطعم</option>
                    <option value="كافيه">كافيه</option>
                    <option value="فندق">فندق</option>
                    <option value="صيدلية">صيدلية</option>
                    <option value="مكان خروج">مكان خروج</option>
                    <option value="متجر إلكتروني">متجر إلكتروني</option>
                    <option value="صفحة فيسبوك">صفحة فيسبوك</option>
                </select>
            </div>
        </div>

        <div id="placesContainer" class="places-grid"></div>
    </div>

    <!-- مودال الإبلاغ (نفسه) -->
    <div class="modal-overlay" id="reportModal">
        <div class="modal-box">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <h2><i class="fas fa-flag"></i> نموذج الإبلاغ عن كيان جديد</h2>
            <form id="reportForm" onsubmit="submitReport(event)">
                <div class="field-group">
                    <label><i class="fas fa-tags"></i> نوع الكيان / المكان</label>
                    <select id="reportCategory" required>
                        <option value="">-- اختر التصنيف --</option>
                        <optgroup label="📍 أماكن وخدمات فعلية">
                            <option value="مطعم">مطعم</option>
                            <option value="كافيه">كافيه</option>
                            <option value="فندق">فندق</option>
                            <option value="صيدلية">صيدلية</option>
                            <option value="مستشفى / عيادة">مستشفى / عيادة</option>
                            <option value="مدرسة / جامعة">مدرسة / جامعة</option>
                            <option value="محل تجاري / سوبر ماركت">محل تجاري / سوبر ماركت</option>
                            <option value="مكان خروج (ملهى / منتجع)">مكان خروج (ملهى / منتجع)</option>
                            <option value="شركة / مؤسسة">شركة / مؤسسة</option>
                            <option value="بنك / صرافة">بنك / صرافة</option>
                            <option value="محطة وقود / خدمة سيارات">محطة وقود / خدمة سيارات</option>
                        </optgroup>
                        <optgroup label="🌐 منصات وحسابات رقمية">
                            <option value="صفحة فيسبوك">صفحة فيسبوك</option>
                            <option value="صفحة إنستغرام">صفحة إنستغرام</option>
                            <option value="حساب واتساب (رقم)">حساب واتساب (رقم)</option>
                            <option value="متجر إلكتروني (أمازون/نون)">متجر إلكتروني (أمازون/نون)</option>
                            <option value="موقع ويب / خدمة أونلاين">موقع ويب / خدمة أونلاين</option>
                        </optgroup>
                        <option value="أخرى">أخرى (اكتب التفاصيل في الوصف)</option>
                    </select>
                </div>
                <div class="field-group">
                    <label><i class="fas fa-store"></i> الاسم</label>
                    <input type="text" id="reportPlaceName" placeholder="مثال: مطعم النيل الأزرق" required>
                </div>
                <div class="field-group">
                    <label><i class="fas fa-map-pin"></i> العنوان أو الرابط</label>
                    <input type="text" id="reportAddress" placeholder="شارع البحر، الإسكندرية / أو رابط الصفحة" required>
                </div>
                <div class="field-group">
                    <label><i class="fas fa-user"></i> اسم المبلغ</label>
                    <input type="text" id="reportReporter" placeholder="أدخل اسمك" required>
                </div>
                <div class="field-group">
                    <label><i class="fas fa-phone"></i> رقم الهاتف</label>
                    <input type="tel" id="reportPhone" placeholder="مثال: 01012345678" required>
                </div>
                <div class="field-group">
                    <label><i class="fas fa-pen"></i> وصف الشكوى</label>
                    <textarea id="reportDescription" placeholder="اكتب تفاصيل الشكوى هنا..." required></textarea>
                </div>
                <div class="field-group">
                    <label><i class="fas fa-image"></i> صورة أو لقطة شاشة (اختياري)</label>
                    <div>
                        <label class="file-label" for="reportImage">
                            <i class="fas fa-upload"></i> اختر ملف
                        </label>
                        <input type="file" id="reportImage" accept="image/*" style="display:none;" onchange="updateFileName(this)">
                        <span class="file-name" id="fileNameDisplay">لم يتم اختيار صورة</span>
                    </div>
                </div>
                <div class="field-group">
                    <label><i class="fas fa-map"></i> رابط الموقع الجغرافي (اختياري)</label>
                    <input type="text" id="reportLocationLink" placeholder="مثال: https://maps.app.goo.gl/xxxx">
                    <p style="font-size:12px; color:var(--muted); margin-top:5px;">رابط خرائط جوجل أو رابط الصفحة الإلكترونية.</p>
                </div>
                <button type="submit" class="btn-submit-report" id="submitBtn">
                    <i class="fas fa-paper-plane"></i> إرسال البلاغ للمراجعة
                </button>
            </form>
        </div>
    </div>

    <div class="toast-stack" id="toastStack"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = 'https://ffubpyvdbcshmbqtzepd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_GeZQTMZJicRvWStnljKi9A_28c-ZKsV';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const TELEGRAM_BOT_TOKEN = '8801607518:AAEsUO9xx1LLUhbv4C7uaPnkVhnAIOj9nHo';
        const TELEGRAM_CHAT_ID = '848066586';

        let currentPlaces = [];
        let selectedFile = null;

        function showToast(message, type = 'info') {
            const stack = document.getElementById('toastStack');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.innerHTML = message;
            stack.appendChild(el);
            setTimeout(() => el.remove(), 3200);
        }

        async function renderPlaces() {
            const container = document.getElementById('placesContainer');
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const category = document.getElementById('categoryFilter').value;

            try {
                const { data, error } = await supabaseClient
                    .from('places')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) {
                    showToast('خطأ في تحميل البيانات: ' + error.message, 'danger');
                    return;
                }

                currentPlaces = data || [];
                document.getElementById('totalCount').textContent = currentPlaces.length;
                document.getElementById('blackCount').textContent = currentPlaces.filter(p => p.is_blacklisted).length;
                document.getElementById('safeCount').textContent = currentPlaces.filter(p => !p.is_blacklisted).length;

                let filtered = currentPlaces.filter(p => {
                    if (p.is_blacklisted !== true) return false;
                    const matchSearch = p.name.toLowerCase().includes(search) || p.address.toLowerCase().includes(search);
                    const matchCategory = category === 'الكل' || p.category === category;
                    return matchSearch && matchCategory;
                });

                if (filtered.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-ban"></i><p>لا توجد أماكن أو كيانات في القائمة السوداء حالياً.</p></div>`;
                    return;
                }

                container.innerHTML = filtered.map(p => {
                    const pct = Math.min((p.complaints_count / 10) * 100, 100);
                    let meterColor = 'var(--safe)';
                    if (p.complaints_count >= 10) meterColor = 'var(--danger)';
                    else if (p.complaints_count >= 7) meterColor = 'var(--warn)';

                    // 🟢 عرض الصورة إذا كانت موجودة
                    const imageHtml = p.image_url ? 
                        `<img src="${p.image_url}" alt="${p.name}" class="place-image" onerror="this.style.display='none'">` : 
                        `<div class="place-image" style="display:flex;align-items:center;justify-content:center;color:#b7ad92;font-size:14px;background:#e9e2d0;"><i class="fas fa-image" style="margin-left:8px;"></i> لا توجد صورة</div>`;

                    return `
                    <div class="place-card blacklisted">
                        <span class="tab">🚫 محظور</span>
                        <div class="card-head">
                            <span class="name">${p.name}</span>
                            <span class="file-id">رقم الملف #${String(p.id).padStart(4, '0')}</span>
                        </div>
                        ${imageHtml}
                        <div class="address"><i class="fas fa-location-dot"></i> ${p.address}</div>
                        <div class="meter-block">
                            <div class="meter-top"><span>عدد الشكاوى المؤكدة</span><b>${p.complaints_count} / 10</b></div>
                            <div class="meter-track"><div class="meter-fill" style="width:${pct}%; background:${meterColor};"></div></div>
                        </div>
                        <div class="stamp">محظور</div>
                    </div>
                `;
                }).join('');

            } catch (err) {
                showToast('حدث خطأ غير متوقع: ' + err.message, 'danger');
            }
        }

        function openModal() {
            document.getElementById('reportModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('reportModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            document.getElementById('reportForm').reset();
            document.getElementById('fileNameDisplay').textContent = 'لم يتم اختيار صورة';
            selectedFile = null;
        }

        function updateFileName(input) {
            const display = document.getElementById('fileNameDisplay');
            if (input.files && input.files.length > 0) {
                selectedFile = input.files[0];
                display.textContent = selectedFile.name;
            } else {
                selectedFile = null;
                display.textContent = 'لم يتم اختيار صورة';
            }
        }

        async function submitReport(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';

            try {
                const category = document.getElementById('reportCategory').value;
                const placeName = document.getElementById('reportPlaceName').value.trim();
                const address = document.getElementById('reportAddress').value.trim();
                const reporter = document.getElementById('reportReporter').value.trim();
                const phone = document.getElementById('reportPhone').value.trim();
                const description = document.getElementById('reportDescription').value.trim();
                const locationLink = document.getElementById('reportLocationLink').value.trim();

                if (!category || !placeName || !address || !reporter || !phone || !description) {
                    showToast('يرجى ملء جميع الحقول المطلوبة', 'danger');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال البلاغ للمراجعة';
                    return;
                }

                let caption = `📢 **بلاغ جديد عن كيان/مكان**\n\n`;
                caption += `🏷️ **النوع:** ${category}\n`;
                caption += `🏠 **الاسم:** ${placeName}\n`;
                if (address.startsWith('http://') || address.startsWith('https://')) {
                    caption += `🔗 **الرابط:** ${address}\n`;
                } else {
                    caption += `📍 **العنوان:** ${address}\n`;
                }
                caption += `👤 **المبلغ:** ${reporter}\n`;
                caption += `📞 **الهاتف:** ${phone}\n`;
                caption += `📝 **السبب:** ${description}\n`;
                if (locationLink) {
                    caption += `🗺️ **رابط الموقع الإضافي:** ${locationLink}\n`;
                }
                caption += `🕒 **التاريخ:** ${new Date().toLocaleString('ar-EG')}`;

                if (selectedFile) {
                    const formData = new FormData();
                    formData.append('chat_id', TELEGRAM_CHAT_ID);
                    formData.append('photo', selectedFile);
                    formData.append('caption', caption);
                    formData.append('parse_mode', 'Markdown');

                    const photoRes = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    const photoResult = await photoRes.json();

                    if (!photoResult.ok) {
                        await sendTextMessage(caption);
                        showToast('تم الإرسال (بدون صورة) بسبب خطأ في رفع الصورة', 'warning');
                    } else {
                        showToast('✅ تم إرسال البلاغ مع الصورة بنجاح!', 'success');
                    }
                } else {
                    await sendTextMessage(caption);
                    showToast('✅ تم إرسال البلاغ بنجاح!', 'success');
                }

                closeModal();

            } catch (err) {
                showToast('خطأ في الإرسال: ' + err.message, 'danger');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال البلاغ للمراجعة';
            }
        }

        async function sendTextMessage(text) {
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: text,
                    parse_mode: 'Markdown'
                })
            });
            return response.json();
        }

        renderPlaces();

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('reportModal');
                if (modal.classList.contains('active')) {
                    closeModal();
                }
            }
        });

        document.getElementById('reportModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
